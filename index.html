<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Grok Workspace</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">

<body>

    <div class="app-container">
    <div id="auroraGlow" class="aurora-bg"></div>

    <div class="chat-container">
        <div class="chat-header">
            <div style="display: flex; align-items: center; gap: 10px;">
                <h2>Grok 4.1</h2>
                <span class="model-badge">XAI Cluster</span>
            </div>
            
            <button id="themeToggleBtn" class="action-btn" title="Toggle Theme">
                <i class="fa-solid fa-palette"></i> Theme
            </button>
        </div>

        <div class="message-feed" id="messageFeed">
            </div>

        <div class="chat-input-area">
            <div class="input-wrapper">
                <textarea id="userInput" placeholder="Ask Grok..." rows="1"></textarea>
                <button id="sendBtn" class="send-btn">
                    <i class="fa-solid fa-arrow-up"></i>
                </button>
            </div>
        </div>
    </div>
</div>
        </aside>

        <main class="chat-container">
            <header class="chat-header">
                <h2 id="currentChatTitle">Grok 4.1</h2>
                <div class="model-badge">XAI Cluster</div>
            </header>

            <div class="message-feed" id="messageFeed">
                </div>

            <footer class="chat-input-area">
                <div class="input-wrapper">
                    <textarea id="userInput" rows="1" placeholder="Type your roleplay or creative scene here..."></textarea>
                    <button class="send-btn" id="sendBtn">
                        <i class="fa-solid fa-arrow-up"></i>
                    </button>
                </div>
            </footer>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
